<div class="wrapper">

  <!-- HEADER -->
  <header class="header">

    <div class="logo-box">
      <img src="/assets/logo.png" class="logo-img">
    </div>

    <div class="user-menu" (click)="toggleMenu()">
      <div class="user-icon">
        {{ username.charAt(0).toUpperCase() }}
      </div>

      <div class="dropdown" *ngIf="menuOpen">
        <p class="username">{{ username }}</p>

        <a (click)="changePassword()" class="menu-link">
          Change Password
        </a>

        <a (click)="logout()" class="menu-link logout">
          Logout
        </a>
      </div>
    </div>

  </header>

  <!-- BODY -->
  <div class="body">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <ul>

        <li routerLink="/agent/dashboard" routerLinkActive="active">
          📊 <span>Dashboard</span>
        </li>

        <li routerLink="/agent/agent-leave" routerLinkActive="active">
          📅 <span>My Leaves</span>
        </li>

      </ul>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
      <router-outlet></router-outlet>
    </div>

  </div>

  <!-- FOOTER -->
  <!-- <footer class="footer">
    © 2026 Complaint Management System | Agent
  </footer> -->

</div>
