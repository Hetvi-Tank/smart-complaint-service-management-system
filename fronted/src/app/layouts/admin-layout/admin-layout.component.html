<div class="wrapper">

  <!-- TOP HEADER -->
  <header class="header">

    <div class="logo-box">
      <img src="assets/logo.png" class="logo-img">
    </div>

    <div class="user-menu" (click)="toggleMenu()">
      <div class="user-icon">
        {{ username.charAt(0).toUpperCase() }}
      </div>

      <div class="dropdown" *ngIf="menuOpen">
        <p class="username">{{ username }}</p>
        <a (click)="changePassword()">Change Password</a>
        <a (click)="logout()" class="logout">Logout</a>
      </div>
    </div>

  </header>

  <!-- BODY -->
  <div class="body">

    <!-- SIDEBAR -->
    <div class="sidebar">

      <ul>
        <li routerLink="/admin/dashboard" routerLinkActive="active">
          📊 <span>Dashboard</span>
        </li>

        <li routerLink="/admin/view-users" routerLinkActive="active">
          👥 <span>Users</span>
        </li>

        <li routerLink="/admin/create-agent" routerLinkActive="active">
          ➕ <span>Create Agent</span>
        </li>

        <li routerLink="/admin/view-agents" routerLinkActive="active">
          🧑‍💼 <span>Agents</span>
        </li>
        <!-- ✅ New Leave Management Link -->
        <li routerLink="/admin/admin-leaves" routerLinkActive="active">
      📅 <span>Leave Requests</span>
    </li>
        <li routerLink="/admin/all-complaints" routerLinkActive="active">
          📄 <span>Complaints</span>
        </li>
      </ul>

    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
      <router-outlet></router-outlet>
    </div>

  </div>

</div>
