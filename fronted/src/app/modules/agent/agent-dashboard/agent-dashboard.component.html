<div class="dashboard-wrapper">

  <div class="dashboard-container">

    <!-- Header -->
    <div class="dashboard-header">
      <h2>Welcome, {{ agentName }}</h2>
      <button (click)="logout()" class="logout-btn">Logout</button>
    </div>

    <!-- Stats Section -->
    <div class="stats-section">
      <div class="stat-card">
        <h4>Total Assigned</h4>
        <p>{{ totalAssigned }}</p>
      </div>

      <div class="stat-card">
        <h4>In Progress</h4>
        <p>{{ inProgress }}</p>
      </div>

      <div class="stat-card">
        <h4>Completed</h4>
        <p>{{ completed }}</p>
      </div>
    </div>

    <!-- Actions Section -->
    <div class="actions-section">

      <button routerLink="/agent/assigned" class="action-btn">
        View Assigned Complaints
      </button>

      <button routerLink="/agent/change-password" class="action-btn">
        Change Password
      </button>

      <button routerLink="/agent/profile" class="action-btn">
        View Profile
      </button>

      <button routerLink="/agent/history" class="action-btn">
        Complaint History
      </button>

    </div>

  </div>

</div>
