<div class="page-wrapper">

  <div class="glass-card">

    <h2>Create Agent</h2>

    <form (ngSubmit)="createAgent()" #formRef="ngForm">

      <!-- Name -->
      <div class="input-group">
        <input type="text"
               name="name"
               placeholder="Full Name"
               [(ngModel)]="agent.name"
               required>
      </div>

      <!-- Email -->
      <div class="input-group">
        <input type="email"
               name="email"
               placeholder="Email Address"
               [(ngModel)]="agent.email"
               required>
      </div>

      <!-- Phone -->
      <div class="input-group">
        <input type="text"
               name="phone"
               placeholder="Phone Number"
               [(ngModel)]="agent.phone"
               required>
      </div>

      <!-- Category Dropdown -->
      <div class="input-group">
        <select name="category"
                [(ngModel)]="agent.category"
                required>

          <option value="" disabled>Select Category</option>
          <option value="Security Service">Security Service</option>
          <option value="Public Utility">Public Utility</option>
          <option value="Electrical">Electrical</option>
          <option value="Plumbing">Plumbing</option>

        </select>
      </div>

      <!-- Gender Radio Buttons -->
      <div class="input-group gender-group">

        <label class="radio-label">
          <input type="radio"
                 name="gender"
                 value="Male"
                 [(ngModel)]="agent.gender"
                 required>
          Male
        </label>

        <label class="radio-label">
          <input type="radio"
                 name="gender"
                 value="Female"
                 [(ngModel)]="agent.gender">
          Female
        </label>

        <label class="radio-label">
          <input type="radio"
                 name="gender"
                 value="Other"
                 [(ngModel)]="agent.gender">
          Other
        </label>

      </div>

      <button type="submit">Create Agent</button>

      <p class="success" *ngIf="successMessage">
        {{ successMessage }}
      </p>

      <p class="error" *ngIf="errorMessage">
        {{ errorMessage }}
      </p>

    </form>

  </div>

</div>
