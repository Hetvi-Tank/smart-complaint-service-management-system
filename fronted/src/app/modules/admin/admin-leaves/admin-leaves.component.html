<h2>Leave Requests</h2>

<table>

<tr>
<th>Agent</th>
<th>Reason</th>
<th>From</th>
<th>To</th>
<th>Status</th>
<th>Action</th>
</tr>

<tr *ngFor="let l of leaves">

<td>{{l.agent?.name}}</td>
<td>{{l.reason}}</td>
<td>{{l.fromDate | date}}</td>
<td>{{l.toDate | date}}</td>
<td>{{l.status}}</td>

<td>

<button (click)="updateLeave(l._id,'Approved')">Approve</button>

<button (click)="updateLeave(l._id,'Rejected')">Reject</button>

</td>

</tr>

</table>
