<div class="dashboard">

  <h2 class="title">Admin Dashboard</h2>

  <!-- STATS CARDS -->
 <div class="cards">

  <div class="card purple">
    <h3>Total Complaints</h3>
    <p>{{ total }}</p>
  </div>

  <div class="card orange">
    <h3>Pending</h3>
    <p>{{ pending }}</p>
  </div>

  <div class="card blue">
    <h3>Assigned</h3>
    <p>{{ assigned }}</p>
  </div>

  <div class="card green">
    <h3>Completed</h3>
    <p>{{ completed }}</p>
  </div>

</div>

  <!-- OPTIONAL: WELCOME / INFO -->
  <div class="info-box">
    <h3>Welcome Admin 👋</h3>
    <p>
      Manage complaints, users, and agents efficiently using the sidebar.
    </p>
  </div>

</div>
<div class="charts">

  <div class="chart-card">
    <h3>Category Wise Complaints</h3>
    <div class="chart-container">
      <canvas id="complaintChart"></canvas>
    </div>
  </div>

  <div class="chart-card">
    <h3>Status Wise</h3>
    <div class="chart-container">
      <canvas id="pieChart"></canvas>
    </div>
  </div>

</div>
