<div class="my-page">

  <div class="my-box">

    <h2>My Complaints</h2>

    <table>

      <tr>
        <th>Title</th>
        <th>Description</th>
        <th>Status</th>
      </tr>

      <tr *ngFor="let c of complaints">
        <td>{{c.title}}</td>
        <td>{{c.description}}</td>
        <td>{{c.status}}</td>
      </tr>

    </table>

    <button routerLink="/user/dashboard">
      Back
    </button>

  </div>

</div>
