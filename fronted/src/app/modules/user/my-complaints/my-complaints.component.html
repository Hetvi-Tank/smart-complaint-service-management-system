<div class="page">

<h2>My Complaints</h2>

<table *ngIf="complaints.length > 0">

<thead>

<tr>

<th>Title</th>
<th>Category</th>
<th>Priority</th>
<th>Status</th>
<th>Date</th>

</tr>

</thead>

<tbody>

<tr *ngFor="let complaint of complaints">

<td>{{complaint.title}}</td>

<td>{{complaint.category}}</td>

<td>{{complaint.priority}}</td>

<td>

<span class="status" [ngClass]="complaint.status">

{{complaint.status}}

</span>

</td>

<td>{{complaint.createdAt | date:'short'}}</td>

</tr>

</tbody>

</table>

<p *ngIf="complaints.length === 0">
No complaints found
</p>

</div>
