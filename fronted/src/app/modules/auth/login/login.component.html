<div class="min-h-screen flex items-center justify-center bg-gradient-to-r from-blue-600 to-indigo-700">

  <div class="bg-white p-8 rounded-xl shadow-lg w-96">

    <h2 class="text-2xl font-bold text-center text-indigo-700 mb-6">
      Login
    </h2>
    <div class="login-page">

  <div class="login-box">

    <form (ngSubmit)="login()">

      <input
        type="email"
        placeholder="Email"
        [(ngModel)]="form.email"
        name="email"
        class="w-full p-3 border rounded mb-4 focus:ring-2 focus:ring-indigo-500"
        required>

      <input
        type="password"
        placeholder="Password"
        [(ngModel)]="form.password"
        name="password"
        class="w-full p-3 border rounded mb-4 focus:ring-2 focus:ring-indigo-500"
        required>

      <button
        type="submit"
        class="w-full bg-indigo-600 text-white p-3 rounded hover:bg-indigo-700 transition">
        Login
      </button>

    </form>
     </div>

</div>

    <p class="text-center text-red-500 mt-3">
      {{message}}
    </p>

    <p class="text-center mt-4 text-sm">
      New user?
      <a routerLink="/register" class="text-indigo-600 font-semibold">
        Register
      </a>
    </p>

  </div>

</div>
