<div class="auth-wrapper">

  <div class="auth-card">

    <h2>Register</h2>

    <form (ngSubmit)="register()" #regForm="ngForm">

      <div class="form-group">
        <label>Name</label>
        <input 
          type="text"
          [(ngModel)]="form.name"
          name="name"
          required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input 
          type="email"
          [(ngModel)]="form.email"
          name="email"
          required>
      </div>

      <div class="form-group">
        <label>Phone</label>
        <input 
          type="text"
          [(ngModel)]="form.phone"
          name="phone"
          required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input 
          type="password"
          [(ngModel)]="form.password"
          name="password"
          required>
      </div>

      <div class="form-group">
        <label>Address</label>
        <input 
          type="text"
          [(ngModel)]="form.address"
          name="address">
      </div>

      <div class="form-group">
        <label>Area</label>
        <input 
          type="text"
          [(ngModel)]="form.area"
          name="area">
      </div>

      <div class="form-group">
        <label>City</label>
        <input 
          type="text"
          [(ngModel)]="form.city"
          name="city">
      </div>

      <button type="submit" class="btn-primary">
        Register
      </button>

    </form>

    <p class="message">{{ message }}</p>

    <div class="switch-text">
      Already have an account?
      <a routerLink="/login">Login</a>
    </div>

  </div>

</div>
