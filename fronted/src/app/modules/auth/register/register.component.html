<div class="min-h-screen flex items-center justify-center bg-gradient-to-r from-purple-600 to-blue-600">

  <div class="bg-white p-8 rounded-xl shadow-lg w-[420px]">

    <h2 class="text-2xl font-bold text-center text-blue-700 mb-6">
      Registration
    </h2>
    <div class="register-page">

  <div class="register-box">

    <form (ngSubmit)="register()">

      <input class="input" placeholder="Name"
        [(ngModel)]="form.name" name="name">

      <input class="input" placeholder="Email"
        [(ngModel)]="form.email" name="email">

      <input class="input" placeholder="Phone"
        [(ngModel)]="form.phone" name="phone">

      <input class="input" placeholder="Password" type="password"
        [(ngModel)]="form.password" name="password">

      <input class="input" placeholder="Address"
        [(ngModel)]="form.address" name="address">

      <input class="input" placeholder="Area"
        [(ngModel)]="form.area" name="area">

      <input class="input" placeholder="City"
        [(ngModel)]="form.city" name="city">

      <button
        class="w-full bg-blue-600 text-white p-3 rounded mt-3 hover:bg-blue-700">
        Register
      </button>

    </form>
    </div>

</div>

    <p class="text-center text-red-500 mt-3">
      {{message}}
    </p>

  </div>

</div>
